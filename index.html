
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video + Audio Words</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #007acc;
      color: white;
    }
    video, audio {
      max-width: 250px;
    }
  </style>
</head>
<body>
  <h1>🎥 Spoken Word Dataset</h1>
  <table>
    <tr>
      <th>Word</th>
      <th>Video</th>
      <th>Audio</th>
    </tr>
    <!-- Example row -->
    <tr>
      <td>ahşap</td>
      <td><video controls src="videos/dataset/ahşap/1.mp4"></video></td>
      <td><audio controls src="videos/dataset/ahşap/1.m4a"></audio></td>
    </tr>
    <tr>
      <td>diyelim</td>
      <td><video controls src="videos/dataset/diyelim/1.mp4"></video></td>
      <td><audio controls src="videos/dataset/diyelim/1.m4a"></audio></td>
    </tr>
     <tr>
      <td>hesap</td>
      <td><video controls src="videos/dataset/hesap/1.mp4"></video></td>
      <td><audio controls src="videos/dataset/hesap/1.m4a"></audio></td>
    </tr>
     <tr>
      <td>iki</td>
      <td><video controls src="videos/dataset/iki/1.mp4"></video></td>
      <td><audio controls src="videos/dataset/iki/1.m4a"></audio></td>
    </tr>
     <tr>
      <td>pandemi</td>
      <td><video controls src="videos/dataset/pandemi/1.mp4"></video></td>
      <td><audio controls src="videos/dataset/pandemi/1.m4a"></audio></td>
    </tr>
  </table>
</body>
</html>
